{% extends "layout.html" %}

{% block body %}
<section class="auth-page login">
    <div class="auth-card">
        <h1>Login</h1>
        <p class="auth-subtitle">Sign in to continue to your school portal.</p>

        {% if error %}
            <p class="auth-error">{{ error }}</p>
        {% endif %}

        <form method="post" class="auth-form">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>

        <div class="auth-hints">
            <p><span>Username field:</span> <img src="{{ url_for('static', filename='Login.png') }}" alt="Username input example"></p>
            <p><span>Password field:</span> <img src="{{ url_for('static', filename='Password.png') }}" alt="Password input example"></p>
        </div>

        <p class="auth-footer">
            Don't have an account? <a href="{{ url_for('register') }}">Register</a>
        </p>
    </div>
</section>
{% endblock %}
